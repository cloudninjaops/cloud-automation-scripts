tagging_resources:

  config:
    account_id:      "123456789099"
    region:          "us-east-1"                                              # optional — defaults to us-east-1
    target_role_arn: "arn:aws:iam::123456789099:role/custom-tagging-role"     # optional — defaults to arn:aws:iam::<account_id>:role/xyz

  resources_list:
    arns:
      - arn:aws:sqs:us-east-1:123456789099:my-queue
      - arn:aws:rds:us-east-1:123456789099:db/mydb
      - arn:aws:lambda:us-east-1:123456789099:function:my-fn

    instance_ids:
      - i-0abc1234
      - i-0def5678

    s3_buckets:
      - my-bucket-1
      - my-bucket-2

    iam_arns:
      - arn:aws:iam::123456789099:role/my-role
      - arn:aws:iam::123456789099:policy/my-policy